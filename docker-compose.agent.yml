services:
  copilot-cli:
    build:
      context: ./infra/copilot-cli
      dockerfile: Dockerfile
    ports:
      - "4321:4321"
    environment:
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN}
    volumes:
      - ~/.contelligence/.copilot-session-state:/root/.copilot/session-state
      - ~/.contelligence:/contelligence
    restart: always
    healthcheck:
      test: ["CMD", "copilot", "--version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  contelligence-agent:
    build:
      context: .
      dockerfile: contelligence-agent/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - contelligence-agent/.env
    volumes:
      - ./contelligence-agent:/app
      - ~/.contelligence:/contelligence
    environment:
      - LOG_LEVEL=DEBUG
      - AZURE_MCP_SERVER_URL=http://azure-mcp:5008
      - CLI_URL=copilot-cli:4321
      - CLI_WORKING_DIRECTORY=/contelligence
      - CLI_SHARED_SKILLS_DIRECTORY=/contelligence/skills
    depends_on:
      azure-mcp:
        condition: service_started
      copilot-cli:
        condition: service_healthy

  azure-mcp:
    image: mcr.microsoft.com/azure-sdk/azure-mcp:latest
    command: ["azmcp", "server", "start", "--transport", "http", "--port", "5008"]
    ports:
      - "5008:5008"
    environment:
      - AZURE_MCP_COLLECT_TELEMETRY_MICROSOFT=false
    volumes:
      # Share Azure CLI credentials for local development
      - ${HOME}/.azure:/root/.azure:ro

